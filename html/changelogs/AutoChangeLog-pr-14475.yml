author: mrmanlikesbt, LemonInTheDark, vinylspiders
delete-after: true
changes:
  - code_imp: Callbacks can no longer be qdeleted. When you are done with a callback,
      clear your references to it. The byond garbage collector will deal with it.
  - code_imp: Removed some leftover instances of the `silent` argument in `Destroy()`.
      We deprecated this roughly two years back.
  - refactor: The simple rotation component is now an element. This should save a
      few megabytes of memory. Oh the joys of 32bit programming!
  - admin: The dynamic panel now refreshes configured variables as well when you press
      the reload storytellers button.
  - bugfix: Fixed full-tile windows showing up as being rotatable when examining them
  - bugfix: Fixed a runtime when examining a hydroponics tray
  - bugfix: Fixed a runtime when a crewmember who had their manifest photo retaken
      from a photobooth entered cryo.
  - bugfix: Fixed not being able to easily insert the ID from a PDA into an ID modification
      console
  - bugfix: Fixed the ethereal disco ball not glowing valid colors
